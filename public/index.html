<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PioneerX Sanctuary | 120B Core</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #terminal { border: 1px solid #00ff41; height: 70vh; overflow-y: auto; padding: 20px; background: #000; margin-bottom: 20px; box-shadow: 0 0 15px #00ff41; }
        .input-box { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-family: inherit; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; }
        .pioneer-text { color: #fff; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>
    <div style="font-size: 0.8em; opacity: 0.7;">PIONEER_STATION // ID: app-ef8b285f...</div>
    <div id="terminal"><div>[SYS] PioneerX Sanctuary Online. Awaiting command...</div></div>
    
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Type command..." onkeypress="if(event.key==='Enter') runPioneer()">
        <button id="exec-btn" onclick="runPioneer()">EXECUTE</button>
    </div>

    <script>
        // 1. Identify App
        puter.appID = 'app-ef8b285f-22db-406a-872e-eb912abac8d2';

        const terminal = document.getElementById('terminal');

        function log(msg, role = "sys") {
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            div.innerHTML = `[${role.toUpperCase()}] ${msg}`;
            if(role === 'pioneer') div.className = 'pioneer-text';
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
            return div;
        }

        async function runPioneer() {
            const input = document.getElementById('user-input');
            const query = input.value;
            if (!query) return;
            
            input.value = '';
            log(query, "user");

            try {
                // Check Auth
                if (!await puter.auth.isSignedIn()) {
                    log("AUTH REQUIRED. OPENING PUTER LOGIN...", "sys");
                    await puter.auth.signIn();
                }

                // Fetch Context
                log("SCRAPING LIVE CONTEXT...", "sys");
                const searchRes = await fetch(`/api/chat?q=${encodeURIComponent(query)}`);
                const searchData = await searchRes.json();

                // Engage 120B Brain
                log("ENGAGING 120B REASONING...", "sys");
                const response = await puter.ai.chat(
                    `Context: ${searchData.context}\n\nUser: ${query}`, 
                    { model: 'openai/gpt-oss-120b', stream: true }
                );

                let replyDiv = log("", "pioneer");
                let fullResponse = "<b>PIONEER:</b> ";

                for await (const part of response) {
                    if (part && part.text) {
                        fullResponse += part.text.replaceAll('\n', '<br>');
                        replyDiv.innerHTML = fullResponse;
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }
            } catch (err) {
                log(`CRITICAL_FAIL: ${err.message}`, "error");
                console.error(err);
            }
        } // <--- This was likely the source of the extra or missing bracket!
    </script>
</body>
</html>
