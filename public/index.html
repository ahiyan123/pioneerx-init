<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PioneerX Sanctuary</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        /* Your existing CSS here */
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        #chat-box { border: 1px solid #444; height: 300px; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h2>PioneerX Intelligent AI (GPT-OSS 120B)</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Ask anything...">
    <button onclick="askPioneer()">Send</button>

    <script>
        async function askPioneer() {
            const query = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div><b>You:</b> ${query}</div>`;

            // STEP A: Fetch Live Web Data from your FastAPI backend
            chatBox.innerHTML += `<div><i>Pioneer is searching the web...</i></div>`;
            const searchResponse = await fetch(`/api/chat?q=${encodeURIComponent(query)}`);
            const searchData = await searchResponse.json();
            const webContext = searchData.context || "No recent data found.";

            // STEP B: Use Puter.js for the Direct 120B Connection
            chatBox.innerHTML += `<div><i>120B Brain is thinking...</i></div>`;
            
            try {
                const response = await puter.ai.chat(
                    `Use this web context: ${webContext}\n\nUser Question: ${query}`,
                    { model: 'gpt-oss-120b', stream: true } // Zero-latency streaming!
                );

                let aiReply = "";
                const replyDiv = document.createElement('div');
                replyDiv.innerHTML = "<b>Pioneer:</b> ";
                chatBox.appendChild(replyDiv);

                for await (const part of response) {
                    aiReply += part.text;
                    replyDiv.innerHTML = `<b>Pioneer:</b> ${aiReply}`;
                }
            } catch (err) {
                replyDiv.innerHTML = "Error: Puter connection failed.";
            }
        }
    </script>
</body>
</html>
