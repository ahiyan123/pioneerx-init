<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneer: Intelligent AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; height: 90vh; }
        h2 { color: #00d4ff; text-align: center; }
        #chat { flex-grow: 1; border: 1px solid #333; overflow-y: auto; padding: 20px; margin-bottom: 15px; border-radius: 12px; background: #1a1a1a; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; line-height: 1.5; }
        .user-msg { background: #2c2c2c; border-left: 4px solid #00d4ff; }
        .ai-msg { background: #252525; border-left: 4px solid #00ff88; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 12px 24px; background: #00d4ff; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pioneer: Intelligent AI</h2>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask the Intelligent AI..." onkeypress="if(event.key === 'Enter') askAI()">
            <button onclick="askAI()">SEND</button>
        </div>
    </div>
    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const q = input.value;
            if(!q) return;
            input.value = '';
            chat.innerHTML += `<div class="msg user-msg"><b>User:</b> ${q}</div>`;
            chat.scrollTop = chat.scrollHeight;
            try {
                const res = await fetch(`/api/chat?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                chat.innerHTML += `<div class="msg ai-msg"><b>AI:</b> ${data.reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai-msg" style="color:red"><b>Error:</b> Check your API Key or connection.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
