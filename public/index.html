<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PioneerX Sanctuary | 120B</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #terminal { border: 1px solid #00ff41; height: 400px; overflow-y: auto; padding: 20px; background: #000; margin-bottom: 20px; }
        .input-box { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>PIONEER_OS [v2.0.6] // CORE: GPT-OSS-120B</h3>
    
    <div id="terminal"><div>[SYS] System initialized. Waiting for command...</div></div>
    
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Type a query..." onkeypress="if(event.key==='Enter') runPioneer()">
        <button onclick="runPioneer()">EXECUTE</button>
    </div>

    <script>
        // 2. Initialize variables after the HTML elements exist
        const terminal = document.getElementById('terminal');

        function addToTerminal(text, role = "sys") {
            const div = document.createElement('div');
            div.innerHTML = `[${role.toUpperCase()}] ${text}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
            return div;
        }

        // 3. Modern Puter 2026 App Identification
        // If setAppKey fails, Puter.js v2 often uses the appID property directly
        try {
            puter.appID = 'app-ef8b285f-22db-406a-872e-eb912abac8d2';
        } catch(e) {
            console.log("AppID setting deferred");
        }

        async function runPioneer() {
            const input = document.getElementById('user-input');
            const query = input.value;
            if (!query) return;
            
            input.value = '';
            addToTerminal(query, "user");

            try {
                // A. Check if the user is signed in (Fixes the 401 error)
                if (!await puter.auth.isSignedIn()) {
                    addToTerminal("AUTHENTICATION REQUIRED. PLEASE SIGN IN...", "sys");
                    await puter.auth.signIn();
                    addToTerminal("SIGN-IN SUCCESSFUL.", "sys");
                }

                // B. Fetch Search Data from your Python API
                addToTerminal("SCRAPING WEB DATA...", "sys");
                const searchRes = await fetch(`/api/chat?q=${encodeURIComponent(query)}`);
                const searchData = await searchRes.json();
                
                // C. Engage 120B Brain
                addToTerminal("ENGAGING 120B REASONING...", "sys");
                const response = await puter.ai.chat(
                    `Context: ${searchData.context}\n\nQuestion: ${query}`, 
                    { model: 'gpt-oss-120b', stream: true }
                );

                let replyDiv = addToTerminal("", "pioneer");
                for await (const part of response) {
                    replyDiv.innerHTML += part.text;
                    terminal.scrollTop = terminal.scrollHeight;
                }
            } catch (err) {
                addToTerminal(`CRITICAL_FAIL: ${err.message}`, "error");
                console.error(err);
            }
        }
    </script>
</body>
</html>
