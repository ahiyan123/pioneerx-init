<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PioneerX Sanctuary | Memory-Enabled 120B</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #terminal { border: 1px solid #00ff41; height: 75vh; overflow-y: auto; padding: 20px; background: #000; box-shadow: 0 0 15px #00ff41; position: relative; }
        .input-area { display: flex; margin-top: 15px; gap: 10px; }
        input { flex-grow: 1; background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-family: inherit; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; }
        .pioneer-text { color: #fff; text-shadow: 0 0 5px #00ff41; border-left: 2px solid #00ff41; padding-left: 10px; margin: 10px 0; }
       </style>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div style="font-size: 0.8em; opacity: 0.6; margin-bottom: 5px;">PIONEER_OS [v2.1.0] // MEMORY_LINK: ACTIVE</div>
    
    <div id="terminal">
        <div class="system-msg">[SYS] Intelligence core online. History tracking enabled.</div>
    </div>
    
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Initiate command..." onkeypress="if(event.key==='Enter') runPioneer()">
    <button onclick="runPioneer()">EXECUTE</button>
    
    <button onclick="PioneerVoice.toggleMic()">
        <span id="mic-text">SYSTEM LISTEN</span>
    </button>
    <button onclick="PioneerVoice.shareReport()">SHARE REPORT</button>
</div>
    <div class="status-subtext" style="margin-top: 10px; font-size: 0.7em;">
        VALUE: Pioneer doesn't know to rest. | ACCENT: <span id="display-accent">EN-US</span>
    </div>

    <script>
        puter.appID = 'app-ef8b285f-22db-406a-872e-eb912abac8d2';

        const term = document.getElementById('terminal');
        let chatHistory = [
            { role: 'system', content: 'You are PioneerX, a strategic intelligence core. Your motto is "Pioneer doesn\'t know to rest." Relate new questions to previous parts of the conversation.' }
        ];

        // --- THE UNIFIED PRINT ENGINE ---
        function print(msg, role = "sys") {
            const div = document.createElement('div');
            div.style.marginBottom = "10px";
            
            // Critical: Classes for the PDF Engine to find the text
            if(role === 'user') div.className = 'user-msg';
            else if(role === 'pioneer') div.className = 'ai-msg pioneer-text';
            else div.className = 'system-msg';

            div.innerHTML = `[${role.toUpperCase()}] ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
            return div;
        }

        // --- THE EXECUTION CORE ---
        async function runPioneer() {
            const input = document.getElementById('user-input');
            const query = input.value;
            if (!query) return;
            
            input.value = '';
            print(query, "user");

            try {
                if (!await puter.auth.isSignedIn()) {
                    print("AUTH REQUIRED. OPENING LOGIN...", "sys");
                    await puter.auth.signIn();
                    return;
                }

                print("CONSULTING 120B MISSION LOG...", "sys");
                chatHistory.push({ role: 'user', content: query });

                const response = await puter.ai.chat(chatHistory, { 
                    model: 'openai/gpt-oss-120b', 
                    stream: true 
                });

                let replyDiv = print("", "pioneer");
                let fullResponse = "<b>PIONEER:</b> ";
                let rawTextOnly = "";

                for await (const part of response) {
                    if (part && part.text) {
                        rawTextOnly += part.text;
                        fullResponse += part.text.replaceAll('\n', '<br>');
                        replyDiv.innerHTML = fullResponse;
                        term.scrollTop = term.scrollHeight;
                    }
                }

                chatHistory.push({ role: 'assistant', content: rawTextOnly });
                
                // Trigger Voice if PioneerVoice is loaded
                if(window.PioneerVoice) PioneerVoice.speakResponse(rawTextOnly);

            } catch (err) {
                print(`CRITICAL_FAIL: ${err.message}`, "error");
            }
        }
    </script>
    <script src="index.js"></script>
</body>
</html>
